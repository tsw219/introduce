<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑のページ</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #fff0f6; /* ベビーピンク */
            font-family: "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* 増えた文字がはみ出さないように */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            z-index: 100;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
        }

        h1 {
            font-size: 3.5rem;
            color: #ff8fab;
            margin: 0 0 20px 0;
        }

        /* 魔法のボタン */
        .magic-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff8fab;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #e0608b;
            transition: 0.1s;
        }

        .magic-button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #e0608b;
        }

        /* 飛び出す文字のスタイル */
        .pop-text {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            animation: popOut 1s ease-out forwards;
            z-index: 10;
        }

        @keyframes popOut {
            0% { transform: scale(0) rotate(0); opacity: 1; }
            100% { transform: scale(1.5) rotate(360deg); opacity: 0; }
        }

        /* メッセージ */
        .msg {
            margin-top: 15px;
            font-weight: bold;
            color: #ff8fab;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="mainTitle">田桑</h1>
        <button class="magic-button" id="spawnBtn">ここを押して！</button>
        <div id="thanksMsg" class="msg">サイトを見てくれてありがとう！</div>
        <div id="yoroshikuMsg" class="msg">よろしくおねがいします</div>
    </div>

    <script>
        const btn = document.getElementById('spawnBtn');
        const colors = ['#ffb7c5', '#c2e9fb', '#fdfcfb', '#e2f0ff', '#fff4e2'];
        let clickCount = 0;

        btn.addEventListener('click', (e) => {
            clickCount++;

            // 1. ボタンを押すたびに「田」「桑」が飛び出す
            for (let i = 0; i < 8; i++) {
                createPopText(e.clientX, e.clientY);
            }

            // 2. 段階的にメッセージを出す
            if (clickCount === 5) {
                document.getElementById('thanksMsg').style.display = 'block';
                btn.innerText = "もっと押して！";
            }
            if (clickCount === 10) {
                document.getElementById('yoroshikuMsg').style.display = 'block';
                btn.innerText = "ありがとう！";
                // 背景色をハッピーな感じに
                document.body.style.backgroundColor = "#ffdeeb";
            }
        });

        function createPopText(x, y) {
            const el = document.createElement('div');
            el.className = 'pop-text';
            el.innerText = Math.random() > 0.5 ? '田' : '桑';
            
            // ランダムな方向に飛ばす
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 200;
            const tx = Math.cos(angle) * dist;
            const ty = Math.sin(angle) * dist;

            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            el.style.fontSize = (Math.random() * 2 + 1) + 'rem';
            
            // 動きをセット
            el.style.setProperty('--tx', `${tx}px`);
            el.style.setProperty('--ty', `${ty}px`);
            
            // JSで直接アニメーションの目的地を操作
            el.animate([
                { transform: 'translate(0, 0) scale(0)', opacity: 1 },
                { transform: `translate(${tx}px, ${ty}px) scale(1.5)`, opacity: 0 }
            ], {
                duration: 1000,
                easing: 'ease-out'
            });

            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
    </script>
</body>
</html>

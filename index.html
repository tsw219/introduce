<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑のページ</title>
    <style>
        :root {
            --bg-color: #ffffff;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            transition: background-color 0.5s ease; /* 背景色変化を滑らかに */
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .container {
            text-align: center;
        }

        /* 名前の演出：弾むような動き */
        .name {
            font-size: 5rem;
            font-weight: bold;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #333;
        }

        .name:hover {
            transform: scale(1.2); /* マウスを乗せると大きく */
        }

        .name:active {
            transform: scale(0.9); /* 押した瞬間だけ少し小さく */
        }

        .message-box {
            margin-top: 20px;
            pointer-events: none; /* 下の文字はクリックの邪魔をしない */
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin: 5px 0;
        }

        /* 画面下部のヒント */
        .hint {
            position: fixed;
            bottom: 20px;
            font-size: 0.8rem;
            color: #bbb;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="name" id="takuwaName">田桑</div>
        
        <div class="message-box">
            <p>サイトを見てくれてありがとう！</p>
            <p>よろしくおねがいします</p>
        </div>
    </div>

    <div class="hint">名前を押してみてね</div>

    <script>
        const nameElement = document.getElementById('takuwaName');
        const colors = ['#FFF5F5', '#F0FFF4', '#F0F5FF', '#FFF9F0', '#F5F0FF', '#FFF0F5'];
        const textColors = ['#FF8080', '#50C878', '#6495ED', '#FFA500', '#9370DB', '#FF69B4'];

        nameElement.addEventListener('click', () => {
            // ランダムに色を選択
            const randomIndex = Math.floor(Math.random() * colors.length);
            
            // 背景色を変える
            document.body.style.backgroundColor = colors[randomIndex];
            
            // 文字色も可愛く変える
            nameElement.style.color = textColors[randomIndex];
            
            // 押した時の「ぷるん」としたアニメーションをリセットして実行
            nameElement.style.animation = 'none';
            nameElement.offsetHeight; // reflow
            nameElement.style.animation = 'bounce 0.4s ease';
        });
    </script>

    <style>
        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1.2); }
        }
    </style>
</body>
</html>

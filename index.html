<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑のページ</title>
    <style>
        body {
            margin: 0;
            background-color: #fff9fb; /* 柔らかいピンクホワイト */
            font-family: sans-serif;
            color: #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 1s;
        }

        /* 最初の画面 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            color: #ff8fab;
        }

        /* 面白いボタン */
        .push-button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: #ffb7c5;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #ff8fab;
            transition: 0.1s;
        }

        .push-button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #ff8fab;
        }

        /* 追加されるセクション */
        .extra-section {
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            opacity: 0;
            transform: translateY(50px);
            transition: 0.8s all ease;
            width: 100%;
        }

        .extra-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .color-1 { background-color: #e2f0ff; color: #70a1ff; }
        .color-2 { background-color: #e2ffe2; color: #2ed573; }
        .color-3 { background-color: #fff4e2; color: #ffa502; }

    </style>
</head>
<body>

    <section class="hero">
        <h1>田桑</h1>
        <button class="push-button" id="moreBtn">なにか見る？</button>
    </section>

    <div id="content-area" style="width: 100%;"></div>

    <script>
        const btn = document.getElementById('moreBtn');
        const area = document.getElementById('content-area');
        
        const messages = [
            { text: "サイトを見てくれてありがとう！", class: "color-1" },
            { text: "よろしくおねがいします", class: "color-2" },
            { text: "おわり！またね！", class: "color-3" }
        ];

        let count = 0;

        btn.addEventListener('click', () => {
            if (count < messages.length) {
                // 新しいセクションを作成
                const newSection = document.createElement('div');
                newSection.className = `extra-section ${messages[count].class}`;
                newSection.innerText = messages[count].text;
                area.appendChild(newSection);

                // 少し遅らせてアニメーション（ふわっと出す）
                setTimeout(() => {
                    newSection.classList.add('show');
                    // 自動で下へスクロール
                    window.scrollTo({
                        top: document.body.scrollHeight,
                        behavior: 'smooth'
                    });
                }, 10);

                count++;

                // 全部出したらボタンを消す
                if (count === messages.length) {
                    btn.innerText = "全部出たよ";
                    btn.style.opacity = "0.5";
                    btn.style.pointerEvents = "none";
                } else {
                    btn.innerText = "もっと！";
                }
            }
        });
    </script>
</body>
</html>

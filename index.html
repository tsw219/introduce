<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑 Profile</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --main-text: #ffffff;
            --accent: #00ff88;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--main-text);
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            overflow-x: hidden;
        }

        /* 背後の巨大な文字（マウスで動く） */
        .bg-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            z-index: -1;
            user-select: none;
            transition: 0.1s ease-out;
        }

        /* メインコンテンツ */
        .content {
            min-height: 200vh; /* スクロールさせるための高さ */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 0.2em;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .scroll-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--accent);
            animation: bounce 2s infinite;
        }

        /* 紹介文セクション */
        .about-section {
            padding: 100px 20px;
            max-width: 600px;
            text-align: center;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: 1s all ease;
            margin-bottom: 50px;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        p {
            font-size: 1.2rem;
            line-height: 2;
            color: #ccc;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <div class="bg-text" id="bgText">TAKUWA</div>

    <div class="content">
        <section class="hero">
            <h1>田桑</h1>
            <div class="scroll-hint">SCROLL DOWN</div>
        </section>

        <section class="about-section">
            <div class="reveal">
                <p>
                    <strong>創造すること、表現すること。</strong><br>
                    田桑（たakuwa）と申します。
                </p>
            </div>
            <div class="reveal">
                <p>
                    シンプルな美しさを大切にしながら、<br>
                    日常に少しの「違和感」と「驚き」を添える<br>
                    ものづくりを目指しています。
                </p>
            </div>
            <div class="reveal">
                <p>
                    趣味は、まだ見ぬ景色を探すこと。<br>
                    新しい技術や、面白いアイデアに<br>
                    触れる瞬間が一番の喜びです。
                </p>
            </div>
        </section>
    </div>

    <script>
        // マウスに合わせて背景を動かす
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            const bgText = document.getElementById('bgText');
            bgText.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        });

        // スクロールでふわっと表示
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
    </script>
</body>
</html>

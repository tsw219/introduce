<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑 | Interactive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #fff;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        /* 固定メッセージ */
        .ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none; /* マウスを透過させる */
            z-index: 100;
        }

        .ui h1 {
            font-size: 5rem;
            margin: 0;
            color: #000;
            letter-spacing: 0.5em;
            padding-left: 0.5em;
        }

        .ui p {
            font-size: 1.2rem;
            color: #888;
            margin-top: 20px;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div class="ui">
        <h1>田桑</h1>
        <p>サイトを見てくれてありがとう！<br>
        文字をマウスで掴んで投げてみてね。よろしくおねがいします</p>
    </div>

    <script>
        // Matter.js の設定
        const { Engine, Render, Runner, Bodies, Composite, MouseConstraint, Mouse, Events } = Matter;

        const engine = Engine.create();
        const world = engine.world;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // 壁の作成（画面外に配置）
        const wallOptions = { isStatic: true, render: { visible: false } };
        Composite.add(world, [
            Bodies.rectangle(window.innerWidth / 2, -50, window.innerWidth, 100, wallOptions), // 天井
            Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth, 100, wallOptions), // 床
            Bodies.rectangle(-50, window.innerHeight / 2, 100, window.innerHeight, wallOptions), // 左壁
            Bodies.rectangle(window.innerWidth + 50, window.innerHeight / 2, 100, window.innerHeight, wallOptions) // 右壁
        ]);

        // 「田」と「桑」のオブジェクトをたくさん生成
        const chars = ['田', '桑'];
        for (let i = 0; i < 20; i++) {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const char = chars[i % 2];
            
            const box = Bodies.rectangle(x, y, 60, 60, {
                frictionAir: 0.05,
                restitution: 0.8,
                render: {
                    sprite: {
                        texture: `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><text x="50%" y="50%" font-size="40" font-weight="bold" font-family="sans-serif" dominant-baseline="central" text-anchor="middle" fill="black">${char}</text></svg>`
                    }
                }
            });
            Composite.add(world, box);
        }

        // マウス操作の追加
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });
        Composite.add(world, mouseConstraint);

        // ウィンドウサイズ変更対応
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

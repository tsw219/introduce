<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑 | MAGNET</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* 黒背景 */
            color: #fff; /* 白文字 */
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .container {
            position: relative;
            text-align: center;
        }

        /* 名前全体のラッパー */
        .name-wrapper {
            display: flex;
            gap: 20px;
            font-size: 8rem;
            font-weight: bold;
        }

        /* ひと文字ずつの設定 */
        .char {
            display: inline-block;
            transition: transform 0.1s ease-out; /* 戻る時は少し早く */
            cursor: default;
        }

        .message {
            position: fixed;
            bottom: 50px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #666;
            font-size: 1rem;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="name-wrapper">
            <span class="char" id="char1">田</span>
            <span class="char" id="char2">桑</span>
        </div>
    </div>

    <div class="message">
        サイトを見てくれてありがとう / よろしくおねがいします
    </div>

    <script>
        const chars = document.querySelectorAll('.char');

        document.addEventListener('mousemove', (e) => {
            chars.forEach(char => {
                const rect = char.getBoundingClientRect();
                const charX = rect.left + rect.width / 2;
                const charY = rect.top + rect.height / 2;

                // マウスと文字の距離を計算
                const diffX = e.clientX - charX;
                const diffY = e.clientY - charY;
                const distance = Math.sqrt(diffX * diffX + diffY * diffY);

                // 200px以内にマウスが来たら反発する
                if (distance < 200) {
                    const angle = Math.atan2(diffY, diffX);
                    const force = (200 - distance) / 2; // 近いほど強く弾く
                    const moveX = Math.cos(angle) * -force;
                    const moveY = Math.sin(angle) * -force;

                    char.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${moveX * 0.1}deg)`;
                } else {
                    // 離れたら元に戻る
                    char.style.transform = `translate(0, 0) rotate(0)`;
                }
            });
        });

        // タッチデバイス対応
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent("mousemove", {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            document.dispatchEvent(mouseEvent);
        }, { passive: false });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑 | Particle Text</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        .footer-message {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #444;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    
    <div class="footer-message">
        サイトを見てくれてありがとう / よろしくおねがいします
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const mouse = { x: 0, y: 0, radius: 80 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor(x, y, targetX, targetY) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = targetX;
                this.targetY = targetY;
                this.size = 2;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1; // 粒子の重さ（動きの速さ）
            }

            draw() {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                // マウスとの距離計算
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    // マウスから逃げる
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // 元の場所（田桑の形）に戻る
                    if (this.x !== this.targetX) {
                        let dx = this.x - this.targetX;
                        this.x -= dx / 10;
                    }
                    if (this.y !== this.targetY) {
                        let dy = this.y - this.targetY;
                        this.y -= dy / 10;
                    }
                }
            }
        }

        function init() {
            particles = [];
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 見えないところで一度「田桑」を描画して座標を取得する
            ctx.fillStyle = 'white';
            ctx.font = 'bold 200px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('田桑', canvas.width / 2, canvas.height / 2 + 70);
            
            // 描画されたピクセルデータをスキャン
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 10ピクセルおきに粒子を配置（密度調整）
            for (let y = 0; y < data.height; y += 8) {
                for (let x = 0; x < data.width; x += 8) {
                    if (data.data[(y * 4 * data.width) + (x * 4) + 3] > 128) {
                        particles.push(new Particle(x, y, x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            init();
        });

        init();
        animate();
    </script>
</body>
</html>

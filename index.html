```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(#6fd36f,#3ea63e);
}

canvas{display:block;}

#scoreUI{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:22px;
background:rgba(0,0,0,0.4);
padding:12px 20px;
border-radius:12px;
backdrop-filter:blur(6px);
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

#menu,#gameOverUI{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:35px;
border-radius:16px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.4);
max-width:420px;
}

#gameOverUI{display:none;}

button{
font-size:18px;
padding:10px 24px;
border:none;
border-radius:10px;
background:#ffcc00;
cursor:pointer;
margin-top:10px;
}

button:hover{background:#ffd84d;}

#rankingMenu,#rankingGameOver{
margin-top:12px;
font-size:16px;
text-align:left;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="scoreUI"></div>

<div id="menu">

<h2>Coin Survival</h2>

<p style="text-align:left">
矢印キー：移動<br>
Shift：ダッシュ<br>
※ダッシュ後しばらく再使用できません<br><br>

🟡 金コイン = 1点<br>
⚪ 銀コイン = 3点<br><br>

10コインごとに敵が速くなる
</p>

<input id="nameInput" placeholder="プレーヤー名（空白OK）">
<br>
<button onclick="startGame()">START</button>

<div id="rankingMenu"></div>

</div>

<div id="gameOverUI">
<h2>GAME OVER</h2>
<div id="rankingGameOver"></div>
<button onclick="restartGame()">もう一度</button>
<button onclick="backToMenu()">最初の画面へ</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let w=window.innerWidth;
let h=window.innerHeight;

canvas.width=w;
canvas.height=h;

window.onresize=()=>{
w=window.innerWidth;
h=window.innerHeight;
canvas.width=w;
canvas.height=h;
}

let player;
let enemies=[];
let coins=[];

let score=0;
let playerName="";

let enemySpeed=1.45;

let dashCooldown=0;
let dashActive=false;
let dashTimer=0;

let gameOver=false;

let keys={};

const topSafe=100;
const margin=30;

let ranking=JSON.parse(localStorage.getItem("coinRanking")||"[]");
let playerCounter=parseInt(localStorage.getItem("playerCounter")||"1");

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function startGame(){

let name=document.getElementById("nameInput").value.trim();

if(name===""){
name="Player"+playerCounter;
playerCounter++;
localStorage.setItem("playerCounter",playerCounter);
}

playerName=name;

player={x:w/2,y:h/2,size:18};

enemies=[];
coins=[];

score=0;
enemySpeed=1.45;

dashCooldown=0;

dashActive=false;

document.getElementById("menu").style.display="none";
document.getElementById("gameOverUI").style.display="none";

spawnCoin();
}

function restartGame(){
startGame();
}

function backToMenu(){
showMenuRanking();
document.getElementById("gameOverUI").style.display="none";
document.getElementById("menu").style.display="block";
}

function spawnEnemy(){

let fast=Math.random()<0.25;
let speed=fast?enemySpeed+1:enemySpeed;

let side=Math.floor(Math.random()*4);

let enemy={x:0,y:0,speed:speed,fast:fast};

if(side===0){enemy.x=margin;enemy.y=Math.random()*(h-topSafe)+topSafe;}
if(side===1){enemy.x=w-margin;enemy.y=Math.random()*(h-topSafe)+topSafe;}
if(side===2){enemy.x=Math.random()*w;enemy.y=topSafe;}
if(side===3){enemy.x=Math.random()*w;enemy.y=h-margin;}

for(let e of enemies){
let dx=e.x-enemy.x;
let dy=e.y-enemy.y;
if(Math.sqrt(dx*dx+dy*dy)<30) return;
}

enemies.push(enemy);
}

function spawnCoin(){

let rare=Math.random()<0.25;

coins.push({
x:Math.random()*(w-margin*2)+margin,
y:Math.random()*(h-topSafe-margin)+topSafe,
value:rare?3:1,
size:rare?13:16
});

}

let enemyTimer=0;

function update(){

if(!player||gameOver) return;

if(keys["Shift"]&&dashCooldown<=0&&!dashActive){
dashActive=true;
dashTimer=60;
dashCooldown=600;
}

let speed=dashActive?8:4;

if(keys["ArrowUp"])player.y-=speed;
if(keys["ArrowDown"])player.y+=speed;
if(keys["ArrowLeft"])player.x-=speed;
if(keys["ArrowRight"])player.x+=speed;

player.x=Math.max(player.size,Math.min(w-player.size,player.x));
player.y=Math.max(player.size,Math.min(h-player.size,player.y));

if(dashActive){
dashTimer--;
if(dashTimer<=0) dashActive=false;
}

if(dashCooldown>0) dashCooldown--;

enemyTimer++;

if(enemyTimer>65){spawnEnemy();enemyTimer=0;}

for(let enemy of enemies){

let dx=player.x-enemy.x;
let dy=player.y-enemy.y;

let dist=Math.sqrt(dx*dx+dy*dy);

enemy.x+=dx/dist*enemy.speed;
enemy.y+=dy/dist*enemy.speed;

if(dist<22){finishGame();}

}

for(let i=coins.length-1;i>=0;i--){

let c=coins[i];

let dx=player.x-c.x;
let dy=player.y-c.y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<22){

score+=c.value;
coins.splice(i,1);
spawnCoin();

if(score%10===0){

enemySpeed+=0.35;
for(let e of enemies){e.speed+=0.35;}

}

}

}

}

function finishGame(){

gameOver=true;

updateRanking();
showGameOverRanking();

document.getElementById("gameOverUI").style.display="block";

}

function updateRanking(){

let existing=ranking.find(r=>r.name===playerName);

if(existing){
if(score>existing.score) existing.score=score;
}else{
ranking.push({name:playerName,score:score});
}

ranking.sort((a,b)=>b.score-a.score);

localStorage.setItem("coinRanking",JSON.stringify(ranking));

}

function showMenuRanking(){

ranking=JSON.parse(localStorage.getItem("coinRanking")||"[]");

let top=ranking.slice(0,5);

let html="<h3>🏆 Top5</h3>";

top.forEach((r,i)=>{
html+=`${i+1}. ${r.name} - ${r.score}<br>`;
});

document.getElementById("rankingMenu").innerHTML=html;

}

function showGameOverRanking(){

let html="<h3>ランキング</h3>";

ranking.forEach((r,i)=>{
html+=`${i+1}. ${r.name} - ${r.score}<br>`;
});

html+=`<br><b>${playerName} のスコア: ${score}</b>`;


document.getElementById("rankingGameOver").innerHTML=html;

}

function drawPlayer(){

ctx.fillStyle="#2f7df6";
ctx.beginPath();
ctx.arc(player.x,player.y,18,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x-6,player.y-4,4,0,Math.PI*2);
ctx.arc(player.x+6,player.y-4,4,0,Math.PI*2);
ctx.fill();

}

function draw(){

ctx.clearRect(0,0,w,h);

if(!player) return;

for(let c of coins){
ctx.fillStyle=c.value==3?"silver":"gold";
ctx.beginPath();
ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
ctx.fill();
}

for(let e of enemies){

ctx.fillStyle=e.fast?"purple":"red";
ctx.beginPath();
ctx.arc(e.x,e.y,12,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(e.x-4,e.y-3,3,0,Math.PI*2);
ctx.arc(e.x+4,e.y-3,3,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(e.x-4,e.y-3,1.5,0,Math.PI*2);
ctx.arc(e.x+4,e.y-3,1.5,0,Math.PI*2);
ctx.fill();

}


drawPlayer();


document.getElementById("scoreUI").innerHTML=
"⭐ Score: "+score+
"<br>⚡ Dash: "+(dashCooldown>0?Math.ceil(dashCooldown/60)+"s":"Ready");

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

showMenuRanking();
loop();

</script>

</body>
</html>

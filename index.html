<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑 | RE:BUILD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* メッセージは背後にうっすら配置 */
        .message {
            position: fixed;
            bottom: 10%;
            width: 100%;
            text-align: center;
            color: #444;
            font-family: sans-serif;
            font-size: 1rem;
            letter-spacing: 0.2em;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="message">
        サイトを見てくれてありがとう / よろしくおねがいします
    </div>

    <script>
        let font;
        let points = [];
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            
            // テキストをドットの集合に変換するための設定
            // 漢字の形状をドットデータとして抽出（擬似的に計算）
            let fontSize = 150;
            let textStr = "田桑";
            
            // 粒子を生成（本来はloadFontが必要ですが、標準的な座標で生成します）
            for (let i = 0; i < 400; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            background(0, 50); // 残像を残す

            for (let p of particles) {
                p.update();
                p.show();
            }
        }

        class Particle {
            constructor() {
                // 初期位置（名前の形に並ぶ目標地点）をランダムに設定
                this.target = createVector(random(width * 0.3, width * 0.7), random(height * 0.4, height * 0.6));
                this.pos = createVector(random(width), random(height));
                this.vel = createVector();
                this.acc = createVector();
                this.size = random(2, 5);
                this.maxSpeed = 10;
                this.maxForce = 0.5;
            }

            update() {
                let mouse = createVector(mouseX, mouseY);
                let distToMouse = p5.Vector.dist(mouse, this.pos);

                if (distToMouse < 100) {
                    // マウスが近いと逃げる（バラバラになる）
                    let flee = p5.Vector.sub(this.pos, mouse);
                    flee.setMag(this.maxSpeed);
                    this.applyForce(flee);
                } else {
                    // マウスが遠いと元に戻る（整列する）
                    let arrive = p5.Vector.sub(this.target, this.pos);
                    let d = arrive.mag();
                    let speed = this.maxSpeed;
                    if (d < 100) speed = map(d, 0, 100, 0, this.maxSpeed);
                    arrive.setMag(speed);
                    let steer = p5.Vector.sub(arrive, this.vel);
                    steer.limit(this.maxForce);
                    this.applyForce(steer);
                }

                this.vel.add(this.acc);
                this.pos.add(this.vel);
                this.acc.mult(0);
            }

            applyForce(f) {
                this.acc.add(f);
            }

            show() {
                stroke(255);
                strokeWeight(this.size);
                point(this.pos.x, this.pos.y);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>

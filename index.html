<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑の自己紹介</title>
    <style>
        /* 全体のレイアウト設定 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        /* 自己紹介カードのスタイル */
        .profile-card {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        /* 名前部分 */
        h1 {
            margin: 10px 0;
            font-size: 24px;
            color: #2c3e50;
        }

        .name-kana {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        /* 各セクション */
        .section {
            text-align: left;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        h2 {
            font-size: 16px;
            color: #3498db;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }

        /* 趣味などのリスト */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 14px;
        }

        li {
            display: inline-block;
            background: #e1f5fe;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 3px;
            color: #0288d1;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>田桑</h1>
        <div class="name-kana">TAKUWA</div>

        <div class="section">
            <h2>自己紹介</h2>
            <p>はじめまして、田桑です。このページをご覧いただきありがとうございます！現在は〇〇を学んだり、取り組んだりしています。</p>
        </div>

        <div class="section">
            <h2>趣味</h2>
            <ul>
                <li>読書</li>
                <li>旅行</li>
                <li>映画鑑賞</li>
            </ul>
        </div>

        <div class="section">
            <h2>一言</h2>
            <p>よろしくお願いします！</p>
        </div>
    </div>

</body>
</html>

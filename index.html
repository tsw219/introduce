<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑 | Trace</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000; /* 真っ黒なキャンバス */
            font-family: "Helvetica Neue", Arial, sans-serif;
            user-select: none;
            cursor: crosshair; /* 描画ツールっぽいカーソル */
        }

        /* 描画キャンバス */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 中央のUI（最初は見えない） */
        .ui-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease-out; /* ゆっくりフェードイン */
            pointer-events: none; /* マウスを透過させる */
        }

        .ui-overlay.show {
            opacity: 1;
        }

        .ui-overlay h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 0.1em;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .ui-overlay p {
            font-size: 1.2rem;
            margin-top: 20px;
        }

        .instruction {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            z-index: 5;
            transition: opacity 1s;
        }

        .instruction.hide {
            opacity: 0;
        }
    </style>
</head>
<body>

    <canvas id="drawingCanvas"></canvas>

    <div class="ui-overlay" id="uiOverlay">
        <h1>田桑</h1>
        <p>サイトを見てくれてありがとう！<br>
        よろしくおねがいします</p>
    </div>

    <div class="instruction" id="instructionText">画面をなぞってみよう...</div>

    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('uiOverlay');
        const instructionText = document.getElementById('instructionText');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let fadeOutTimer;
        let drawCount = 0; // 描画回数でメッセージ表示を制御

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; // 光の色
            ctx.lineWidth = 20; // 線の太さ
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 15; // 光のぼかし
            ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
        }

        function startDrawing(e) {
            isDrawing = true;
            [lastX, lastY] = [e.offsetX || e.touches[0].clientX, e.offsetY || e.touches[0].clientY];
            clearTimeout(fadeOutTimer); // 描画中は消えないように
            instructionText.classList.add('hide'); // 説明文を消す
        }

        function draw(e) {
            if (!isDrawing) return;

            drawCount++;
            if (drawCount > 50) { // ある程度描いたらメッセージ表示
                uiOverlay.classList.add('show');
            }

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(e.offsetX || e.touches[0].clientX, e.offsetY || e.touches[0].clientY);
            ctx.stroke();
            [lastX, lastY] = [e.offsetX || e.touches[0].clientX, e.offsetY || e.touches[0].clientY];
        }

        function stopDrawing() {
            isDrawing = false;
            // 描画を止めたらゆっくり消えるように
            fadeOutTimer = setTimeout(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height); // キャンバスをクリア
            }, 3000); // 3秒後に消える
        }

        // イベントリスナー
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // タッチイベント
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>

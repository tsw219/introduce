<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑 Profile</title>
    <style>
        /* 基本は白背景・黒文字 */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            color: #000000;
            font-family: "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.1s, color 0.1s;
            overflow: hidden;
            user-select: none;
        }

        /* 反転時のスタイル */
        body.inverted {
            background-color: #000000;
            color: #ffffff;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            line-height: 1;
            transition: transform 0.1s;
        }

        /* 飛び跳ねるアニメーション */
        .jump {
            animation: jumpAnim 0.3s ease;
        }

        @keyframes jumpAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) translateY(-20px); }
            100% { transform: scale(1); }
        }

        /* わかりやすいボタン */
        .main-button {
            margin-top: 40px;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            background: none;
            border: 4px solid currentColor; /* 文字色と同じ色になる */
            cursor: pointer;
            transition: transform 0.1s;
        }

        .main-button:active {
            transform: scale(0.9);
        }

        .message {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            visibility: hidden;
        }

        .message.show {
            visibility: visible;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="takuwaText">田桑</h1>
        
        <button class="main-button" id="toggleBtn">PUSH</button>
        
        <div class="message" id="msg">
            サイトを見てくれてありがとう！<br>
            よろしくおねがいします
        </div>
    </div>

    <script>
        const body = document.body;
        const btn = document.getElementById('toggleBtn');
        const takuwa = document.getElementById('takuwaText');
        const msg = document.getElementById('msg');
        let count = 0;

        btn.addEventListener('click', () => {
            count++;

            // 1. 白黒を反転させる
            body.classList.toggle('inverted');

            // 2. 文字を跳ねさせる
            takuwa.classList.remove('jump');
            void takuwa.offsetWidth; // アニメーションのリセット
            takuwa.classList.add('jump');

            // 3. 何回か押すとメッセージが出る
            if (count >= 3) {
                msg.classList.add('show');
                btn.innerText = "THANKS";
            }
        });
    </script>

</body>
</html>

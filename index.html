<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑の自己紹介</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fcfafc; /* ほんのりラベンダーがかった白 */
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", sans-serif;
            color: #444;
        }

        .container {
            text-align: center;
        }

        /* 名前の演出：ホバーで色付きの影が出る */
        .name {
            font-size: 3.5rem;
            font-weight: bold;
            display: inline-block;
            cursor: default;
            transition: all 0.4s ease;
            position: relative;
            color: #333;
        }

        .name:hover {
            transform: translateY(-5px);
            text-shadow: 
                4px 4px 0px #ffd1dc,  /* パステルピンク */
                8px 8px 0px #d0f4de;  /* パステルグリーン */
        }

        .message-box {
            margin-top: 30px;
        }

        p {
            font-size: 1.1rem;
            margin: 10px 0;
            letter-spacing: 0.05em;
        }

        .accent-text {
            color: #ff9aa2;
            font-weight: bold;
        }

        /* シンプルなライン */
        .line {
            width: 40px;
            height: 2px;
            background: #eee;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="name">田桑</div>
        
        <div class="line"></div>

        <div class="message-box">
            <p>サイトを見てくれて<span class="accent-text">ありがとう！</span></p>
            <p>よろしくおねがいします</p>
        </div>
    </div>

</body>
</html>

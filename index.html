<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑 | SCROLL</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        /* 各セクションの高さ */
        section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 巨大な背景文字 */
        .bg-char {
            position: absolute;
            font-size: 60vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }

        /* メインのメッセージ */
        .content {
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 0.2em;
        }

        p {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #888;
        }

        /* 下部への誘導線 */
        .scroll-line {
            position: absolute;
            bottom: 20px;
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, #fff, transparent);
            animation: scrollMove 2s infinite;
        }

        @keyframes scrollMove {
            0% { transform: translateY(-10px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(30px); opacity: 0; }
        }
    </style>
</head>
<body>

    <section>
        <div class="bg-char" id="char-ta" style="left: -10%;">田</div>
        <div class="content">
            <h1>田桑</h1>
        </div>
        <div class="scroll-line"></div>
    </section>

    <section>
        <div class="bg-char" id="char-ku" style="right: -10%;">桑</div>
        <div class="content">
            <p>サイトを見てくれて<br>ありがとう！</p>
        </div>
    </section>

    <section>
        <div class="content">
            <p>よろしくおねがいします</p>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;

            // スクロール量に合わせて背景の文字を横にスライドさせる
            const charTa = document.getElementById('char-ta');
            const charKu = document.getElementById('char-ku');

            // 「田」は右へ、「桑」は左へ動く
            charTa.style.transform = `translateX(${scrollY * 0.5}px)`;
            charKu.style.transform = `translateX(${- (scrollY - windowHeight) * 0.5}px)`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田桑 Profile</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fafafa;
            color: #333;
            font-family: sans-serif;
        }

        .container {
            text-align: center;
        }

        /* 漢字を1文字ずつ動かすための設定 */
        .name-container {
            display: inline-block;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .char {
            display: inline-block;
            font-size: 4rem;
            font-weight: bold;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* マウスを乗せた時の動き（バラバラになる） */
        .name-container:hover .char:nth-child(1) { transform: translate(-15px, -10px) rotate(-15deg); color: #555; }
        .name-container:hover .char:nth-child(2) { transform: translate(15px, 10px) rotate(15deg); color: #555; }

        .info {
            font-size: 1rem;
            letter-spacing: 0.1em;
            color: #888;
        }

        hr {
            width: 30px;
            border: none;
            border-top: 2px solid #333;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="name-container">
            <span class="char">田</span>
            <span class="char">桑</span>
        </div>
        
        <hr>

        <div class="info">
            <p>WEB DEVELOPER / DESIGNER</p>
            <p>CONTACT: example@mail.com</p>
        </div>
    </div>

</body>
</html>
